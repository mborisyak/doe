[workspace]
authors = ["Mark"]
channels = ["conda-forge"]
name = "doe"
platforms = ["linux-64"]
version = "0.0.1"

[tasks]
setup = "PYTHONPATH=.:mcp python -c \"import black, diffrax, doe, jax, mcp, mcp_contracts, mcp_engine, mcp_errors, mcp_tools, numpy, optax, pydantic, pytest, ruff, sympy; print('setup complete')\""
test = { depends-on = ["test-mcp", "test-doe"] }
test-mcp = "PYTHONPATH=.:mcp pytest mcp/tests"
test-doe = "PYTHONPATH=. pytest tests"
lint = { depends-on = ["lint-ruff", "lint-black"] }
lint-ruff = "ruff check mcp tests"
lint-black = "black --check --workers 1 mcp tests"
format = { depends-on = ["format-black", "format-ruff"] }
format-black = "black mcp tests"
format-ruff = "ruff check --fix mcp tests"
run = "PYTHONPATH=. python mcp/server.py"

[dependencies]
python = ">=3.11,<3.13"
pip = ">=24"

[pypi-dependencies]
black = ">=24"
diffrax = ">=0.7.0"
# jax = ">=0.9.0"
jax = { version = "*", extras = ["cuda12"] } #change for your cuda version
matplotlib = ">=3.9.0"
mcp = ">=1.2.0"
numpy = ">=2.0.0"
optax = ">=0.2.6"
pydantic = ">=2.0.0"
pytest = ">=8"
ruff = ">=0.6.0"
sympy = ">=1.14.0"
doe = { path = ".", editable = true }
